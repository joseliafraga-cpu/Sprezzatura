<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Sprezzatura"/>
<title>Sprezzatura</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#1A2838;min-height:100vh}
#app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column}
.pg{display:none;flex-direction:column;flex:1}
.pg.on{display:flex}
/* AUTH */
#auth{background:#1A2838;align-items:center;padding:40px 20px;flex:1}
.logo{font-family:Georgia,serif;font-size:60px;color:#B69040;font-style:italic;text-align:center;line-height:1}
.logo-sub{font-size:9px;letter-spacing:5px;color:#C6B89E;text-transform:uppercase;text-align:center;margin-top:4px}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:20px;width:100%;margin-top:24px}
.card-title{color:#fff;font-size:18px;font-family:Georgia,serif;margin-bottom:4px}
.card-sub{color:rgba(198,184,158,.6);font-size:12px;margin-bottom:16px}
.inp{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:12px;font-size:14px;color:#fff;width:100%;margin-bottom:10px;outline:none}
.inp::placeholder{color:rgba(255,255,255,.35)}
.btn-gold{background:#B69040;color:#1A2838;border:none;border-radius:8px;padding:13px;font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:700;width:100%;cursor:pointer;margin-top:4px}
.btn-dark{background:rgba(255,255,255,.12);color:#C6B89E;border:none;border-radius:8px;padding:12px;font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600;width:100%;cursor:pointer;margin-top:8px}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,.1)}
.divider-text{color:rgba(255,255,255,.3);font-size:10px;text-transform:uppercase;letter-spacing:2px}
.err{background:rgba(180,30,30,.4);border:1px solid rgba(200,50,50,.5);color:#ffaaaa;border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:10px;display:none}
.suc{background:rgba(30,120,60,.4);border:1px solid rgba(50,150,80,.5);color:#8AE6A2;border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:10px;display:none}
.link{color:#B69040;cursor:pointer;text-decoration:underline}
.toggle{font-size:12px;color:rgba(198,184,158,.6);text-align:center;margin-top:10px}
/* TOP */
.topbar{background:#1A2838;height:52px;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.brand{font-family:Georgia,serif;font-size:20px;color:#B69040;font-style:italic}
.brand-rest{font-size:9px;letter-spacing:3px;color:#C6B89E;text-transform:uppercase}
.sep{width:1px;height:16px;background:#2C4560}
.page-title{font-size:11px;color:#887E6E;flex:1}
.btn-top{background:none;border:1px solid #2C4560;color:#B69040;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border-radius:20px;cursor:pointer}
.btn-sair{background:none;border:none;color:#887E6E;font-size:11px;cursor:pointer}
/* BODY */
.body{flex:1;overflow-y:auto;padding-bottom:20px}
.section{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#887E6E;padding:16px 14px 6px;font-weight:600}
/* STAT CARD */
.stat-card{margin:0 14px 8px;border:1px solid #D8CDB8;border-radius:10px;overflow:hidden}
.stat-row{display:flex;align-items:center;gap:14px;padding:14px}
.ring-wrap{position:relative;flex-shrink:0}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:Georgia,serif;font-size:16px;font-weight:500;color:#1A2838}
.ring-sub{font-size:7px;text-transform:uppercase;letter-spacing:1px;color:#887E6E}
.stat-items{flex:1;display:flex;flex-direction:column;gap:6px}
.stat-item{display:flex;align-items:center;gap:7px}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stat-lbl{font-size:11px;color:#484438;flex:1}
.stat-val{font-family:Georgia,serif;font-size:15px;font-weight:500}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 12px 12px}
.stat-box{background:#F5F2EC;border-radius:8px;padding:8px;text-align:center}
.stat-num{font-family:Georgia,serif;font-size:20px;font-weight:500;color:#1A2838}
.stat-name{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:#887E6E;margin-top:2px}
/* MENTEE LIST */
.mentee-card{margin:0 14px;border:1px solid #D8CDB8;border-radius:10px;overflow:hidden}
.mentee-row{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;border-bottom:1px solid #E8E1D4}
.mentee-row:last-child{border-bottom:none}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.mentee-name{font-size:13px;font-weight:500;color:#1A2838}
.mentee-co{font-size:10px;color:#887E6E;margin-top:1px}
.badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;align-items:center}
.badge{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:600;text-transform:uppercase}
.badge-late{background:#fde6e6;color:#882020}
.badge-count{font-size:9px;color:#887E6E}
.ring-sm{position:relative;flex-shrink:0}
.ring-sm-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
/* DETAIL */
.detail-hero{background:#1A2838;padding:14px}
.back-btn{background:none;border:none;color:#C6B89E;font-size:24px;cursor:pointer;padding:0;margin-bottom:10px;line-height:1}
.detail-info{display:flex;align-items:center;gap:12px}
.detail-name{font-family:Georgia,serif;font-size:20px;color:#fff;font-weight:500}
.detail-sub{font-size:10px;color:#C6B89E;margin-top:2px}
.tabs{display:flex;background:#1A2838;border-bottom:1px solid #2C4560;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;color:#887E6E;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:9px 13px;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500}
.tab.on{color:#B69040;border-bottom-color:#B69040}
/* ACTIONS */
.act-card{margin:0 14px 8px;border:1px solid #D8CDB8;border-radius:10px;overflow:hidden}
.act-row{padding:11px 13px;border-bottom:1px solid #E8E1D4}
.act-row:last-child{border-bottom:none}
.act-inner{display:flex;align-items:flex-start;gap:9px}
.check{width:22px;height:22px;border-radius:50%;border:1.5px solid #D8CDB8;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s}
.check.done{background:#3A7848;border-color:#3A7848}
.act-title{font-size:13px;font-weight:500;color:#1A2838;line-height:1.4}
.act-title.done{text-decoration:line-through;color:#887E6E}
.act-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.act-kpi{font-size:10px;color:#D4AA5E;font-style:italic}
.act-date{font-size:10px;margin-top:4px}
/* SWOT */
.swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px}
.swot-q{border-radius:8px;overflow:hidden;border:1px solid #D8CDB8}
.swot-head{padding:7px 9px}
.swot-name{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.swot-body{padding:6px 9px 8px}
.swot-item{display:flex;gap:5px;font-size:11px;color:#484438;padding:2px 0;line-height:1.4}
.swot-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:5px}
/* SESSOES */
.sess-card{margin:0 14px 20px;border:1px solid #D8CDB8;border-radius:10px;overflow:hidden}
.sess-row{padding:11px 13px;border-bottom:1px solid #E8E1D4}
.sess-row:last-child{border-bottom:none}
.sess-head{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.sess-date{font-size:11px;font-weight:600;color:#1A2838}
.sess-mentor{font-size:10px;color:#887E6E}
.sess-note{font-size:11px;color:#484438;line-height:1.55}
/* SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190;display:none}
.overlay.on{display:block}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:#fff;border-radius:16px 16px 0 0;z-index:200;max-height:90vh;overflow-y:auto;transition:transform .3s}
.sheet.on{transform:translateX(-50%) translateY(0)}
.sheet-handle{width:36px;height:4px;background:#D8CDB8;border-radius:2px;margin:12px auto 0}
.sheet-title{font-family:Georgia,serif;font-size:20px;color:#1A2838;padding:12px 16px 0}
.sheet-body{padding:12px 16px 32px;display:flex;flex-direction:column;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#887E6E;font-weight:600}
.fi{background:#F5F2EC;border:1px solid #D8CDB8;border-radius:8px;padding:10px 12px;font-size:13px;color:#1A2838;outline:none;width:100%;font-family:inherit}
.fi:focus{border-color:#1A2838}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-primary{background:#1A2838;color:#F5F2EC;border:none;border-radius:8px;padding:13px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:700;width:100%}
.btn-secondary{background:transparent;color:#887E6E;border:1px solid #D8CDB8;border-radius:8px;padding:12px;font-size:11px;text-transform:uppercase;cursor:pointer;width:100%}
/* TOAST */
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-8px);background:#1A2838;color:#F5F2EC;padding:8px 20px;border-radius:20px;font-size:12px;z-index:500;opacity:0;transition:all .3s;white-space:nowrap;border:1px solid #2C4560;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:40px 20px;color:#887E6E;font-size:13px}
</style>
</head>
<body>
<div id="app">
<div class="toast" id="toast"></div>
<div class="overlay" id="ov" onclick="closeSh()"></div>

<!-- AUTH -->
<div class="pg on" id="auth">
  <div class="logo">S</div>
  <div class="logo-sub">PREZZATURA · MENTORIA EMPRESARIAL</div>

  <div class="card">
    <div class="card-title">Sou Mentorado</div>
    <div class="card-sub">Acesse seu plano de metas</div>
    <div class="err" id="me-err"></div>
    <div class="suc" id="me-ok"></div>
    <div id="me-name-wrap" style="display:none">
      <input class="inp" id="me-name" placeholder="Seu nome completo"/>
    </div>
    <input class="inp" id="me-email" type="email" placeholder="Seu e-mail" autocomplete="email"/>
    <input class="inp" id="me-pass" type="password" placeholder="Sua senha"/>
    <button class="btn-gold" id="me-btn" onclick="doMentee()">ENTRAR</button>
    <div class="toggle" id="me-tog">Primeiro acesso? <span class="link" onclick="toggleReg()">Criar conta</span></div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">ou</div>
    <div class="divider-line"></div>
  </div>

  <div class="card">
    <div class="card-title">Sou Mentor</div>
    <div class="err" id="mt-err"></div>
    <input class="inp" id="mt-email" type="email" placeholder="E-mail do mentor"/>
    <input class="inp" id="mt-pass" type="password" placeholder="Senha"/>
    <button class="btn-dark" id="mt-btn" onclick="doMentor()">ENTRAR COMO MENTOR</button>
  </div>

  <div style="margin-top:20px;font-size:10px;color:rgba(200,186,160,.25);text-align:center;letter-spacing:3px">DENISE MILK · ARLEY BARRETO</div>
</div>

<!-- HOME -->
<div class="pg" id="home">
  <div class="topbar">
    <span class="brand">S</span><span class="brand-rest">PREZZATURA</span>
    <div class="sep"></div>
    <div class="page-title" id="home-title">Dashboard</div>
    <button class="btn-top" id="btn-add-m" onclick="openSh('sh-mentee')" style="display:none">+ Mentorado</button>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
  <div class="body" id="home-body"></div>
</div>

<!-- DETAIL -->
<div class="pg" id="detail">
  <div class="detail-hero" id="d-hero"></div>
  <div class="tabs" id="d-tabs"></div>
  <div class="body" id="d-body"></div>
</div>

<!-- SHEETS -->
<div class="sheet" id="sh-mentee">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Novo Mentorado</div>
  <div class="sheet-body">
    <div class="field"><label>Nome</label><input class="fi" id="fm-n" placeholder="Nome completo"/></div>
    <div class="field"><label>Empresa</label><input class="fi" id="fm-c" placeholder="Empresa"/></div>
    <div class="row2">
      <div class="field"><label>Caminho</label><select class="fi" id="fm-p"><option value="essencia">Essência</option><option value="trajetoria" selected>Trajetória</option><option value="legado">Legado</option></select></div>
      <div class="field"><label>Ciclo</label><input class="fi" id="fm-cy" placeholder="Q2·2025"/></div>
    </div>
    <button class="btn-primary" onclick="saveMentee()">Cadastrar</button>
    <button class="btn-secondary" onclick="closeSh()">Cancelar</button>
  </div>
</div>

<div class="sheet" id="sh-action">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Nova Ação</div>
  <div class="sheet-body">
    <div class="field"><label>Comprometimento</label><input class="fi" id="fa-t" placeholder="Ação acordada..."/></div>
    <div class="field"><label>Por quê?</label><input class="fi" id="fa-w" placeholder="Problema que resolve"/></div>
    <div class="field"><label>KPI</label><input class="fi" id="fa-k" placeholder="Como medimos"/></div>
    <div class="row2">
      <div class="field"><label>Baseline</label><input class="fi" id="fa-b" placeholder="Hoje"/></div>
      <div class="field"><label>Meta</label><input class="fi" id="fa-g" placeholder="Objetivo"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Prioridade</label><select class="fi" id="fa-pr"><option value="high">Alta</option><option value="medium" selected>Média</option><option value="low">Baixa</option></select></div>
      <div class="field"><label>Prazo</label><input class="fi" type="date" id="fa-d"/></div>
    </div>
    <button class="btn-primary" onclick="saveAction()">Adicionar</button>
    <button class="btn-secondary" onclick="closeSh()">Cancelar</button>
  </div>
</div>

<div class="sheet" id="sh-ci">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Registrar Sessão</div>
  <div class="sheet-body">
    <div class="row2">
      <div class="field"><label>Data</label><input class="fi" type="date" id="ci-d"/></div>
      <div class="field"><label>Mentor</label><select class="fi" id="ci-m"><option>Denise Milk</option><option>Arley Barreto</option><option>Ambos</option></select></div>
    </div>
    <div class="field"><label>Energia</label><select class="fi" id="ci-mo"><option value="🟢 Animado">🟢 Animado</option><option value="🔵 Determinado">🔵 Determinado</option><option value="🟡 Reflexivo">🟡 Reflexivo</option><option value="🔴 Preocupado">🔴 Preocupado</option></select></div>
    <div class="field"><label>Observações</label><textarea class="fi" id="ci-n" rows="3" placeholder="Insights e encaminhamentos..."></textarea></div>
    <button class="btn-primary" onclick="saveCI()">Registrar</button>
    <button class="btn-secondary" onclick="closeSh()">Cancelar</button>
  </div>
</div>

<script>
var U='https://spwjdopegvbsrqgcytlq.supabase.co';
var K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwd2pkb3BlZ3Zic3JxZ2N5dGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTczNzUsImV4cCI6MjA5MzQ5MzM3NX0.xRHBeDWdbiSAGhbyiBR30HvqOFQmEcu-WZKV5aQlK9I';
var PC={essencia:{l:'Essência',c:'#3A3A26',bg:'#EAECE2'},trajetoria:{l:'Trajetória',c:'#7A3C26',bg:'#F2EBE6'},legado:{l:'Legado',c:'#1A2838',bg:'#E6EBF2'}};
var PW={high:3,medium:2,low:1},PCOL={high:'#882020',medium:'#B69040',low:'#887E6E'},PL={high:'Alta',medium:'Média',low:'Baixa'};
var TK=null,UID=null,PROF=null,MENTEES=[],CUR=null,CTAB='plano',REG=false,CURCI=null;

function td(){return new Date().toISOString().split('T')[0];}
function fd(d){if(!d)return'—';var p=d.split('T')[0].split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function dl(d){return d?Math.ceil((new Date(d.split('T')[0])-new Date(td()))/86400000):null;}
function isLate(d,done){return !done&&d&&d.split('T')[0]<td();}
function avs(n){return n?n.split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase():'??';}
function wp(a){if(!a||!a.length)return 0;var t=a.reduce(function(s,x){return s+(PW[x.priority]||1);},0);var d=a.filter(function(x){return x.done;}).reduce(function(s,x){return s+(PW[x.priority]||1);},0);return t?Math.round(d/t*100):0;}

function ring(pct,sz,sw,c,tr){
  tr=tr||'#E8E1D4';
  var r=(sz-sw)/2,cx=sz/2,ci=2*Math.PI*r,da=(pct/100)*ci;
  return '<svg width="'+sz+'" height="'+sz+'" style="transform:rotate(-90deg)" viewBox="0 0 '+sz+' '+sz+'">'
    +'<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="'+tr+'" stroke-width="'+sw+'"/>'
    +'<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="'+sw+'" stroke-dasharray="'+da+' '+ci+'" stroke-linecap="round"/>'
    +'</svg>';
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');},2500);
}

function show(id){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
  document.getElementById(id).classList.add('on');
}

function showE(id,msg,isOk){
  var e=document.getElementById(id);
  if(!e)return;
  e.textContent=msg;
  e.style.display='block';
  if(isOk){e.className='suc';}else{e.className='err';}
}

function hideE(id){
  var e=document.getElementById(id);
  if(e)e.style.display='none';
}

function openSh(id){
  document.getElementById('ov').classList.add('on');
  document.getElementById(id).classList.add('on');
  if(id==='sh-ci')document.getElementById('ci-d').value=td();
}

function closeSh(){
  document.getElementById('ov').classList.remove('on');
  document.querySelectorAll('.sheet').forEach(function(s){s.classList.remove('on');});
}

async function sbFetch(method,path,body){
  var h={apikey:K,'Content-Type':'application/json','Prefer':'return=representation','Authorization':'Bearer '+(TK||K)};
  var opts={method:method,headers:h};
  if(body!==null&&body!==undefined)opts.body=JSON.stringify(body);
  var r=await fetch(U+path,opts);
  var txt=await r.text();
  if(!r.ok){
    var msg=txt;
    try{var j=JSON.parse(txt);msg=j.message||j.error_description||j.error||txt;}catch(e){}
    throw new Error(msg);
  }
  return txt?JSON.parse(txt):{};
}

function toggleReg(){
  REG=!REG;
  document.getElementById('me-name-wrap').style.display=REG?'block':'none';
  document.getElementById('me-btn').textContent=REG?'CRIAR CONTA':'ENTRAR';
  document.getElementById('me-tog').innerHTML=REG
    ?'Já tem conta? <span class="link" onclick="toggleReg()">Entrar</span>'
    :'Primeiro acesso? <span class="link" onclick="toggleReg()">Criar conta</span>';
}

async function doMentee(){
  hideE('me-err');hideE('me-ok');
  var email=(document.getElementById('me-email').value||'').trim();
  var pass=document.getElementById('me-pass').value||'';
  if(!email||!pass){showE('me-err','Preencha e-mail e senha.');return;}
  var btn=document.getElementById('me-btn');
  btn.disabled=true;btn.textContent='...';
  try{
    if(REG){
      var name=(document.getElementById('me-name').value||'').trim();
      if(!name){showE('me-err','Informe seu nome.');btn.disabled=false;btn.textContent='CRIAR CONTA';return;}
      var d=await sbFetch('POST','/auth/v1/signup',{email:email,password:pass});
      if(d.user){
        await sbFetch('POST','/rest/v1/profiles',{id:d.user.id,name:name,role:'mentorado',email:email});
      }
      showE('me-ok','✓ Conta criada! Agora faça login.',true);
      REG=false;toggleReg();
    }else{
      var d2=await sbFetch('POST','/auth/v1/token?grant_type=password',{email:email,password:pass});
      TK=d2.access_token;UID=d2.user.id;
      var profs=await sbFetch('GET','/rest/v1/profiles?id=eq.'+UID+'&select=*');
      PROF=(Array.isArray(profs)?profs[0]:profs)||{role:'mentorado',name:email};
      await loadData();
      show('home');
    }
  }catch(e){
    showE('me-err',e.message.indexOf('Invalid')>=0||e.message.indexOf('credentials')>=0?'E-mail ou senha incorretos.':e.message);
  }
  btn.disabled=false;btn.textContent=REG?'CRIAR CONTA':'ENTRAR';
}

async function doMentor(){
  hideE('mt-err');
  var email=(document.getElementById('mt-email').value||'').trim();
  var pass=document.getElementById('mt-pass').value||'';
  if(!email||!pass){showE('mt-err','Preencha e-mail e senha.');return;}
  var btn=document.getElementById('mt-btn');
  btn.disabled=true;btn.textContent='...';
  try{
    var d=await sbFetch('POST','/auth/v1/token?grant_type=password',{email:email,password:pass});
    TK=d.access_token;UID=d.user.id;
    var profs=await sbFetch('GET','/rest/v1/profiles?id=eq.'+UID+'&select=*');
    PROF=(Array.isArray(profs)?profs[0]:profs)||null;
    if(!PROF||PROF.role!=='mentor'){
      TK=null;UID=null;
      showE('mt-err','Esta conta não tem permissão de mentor.');
      btn.disabled=false;btn.textContent='ENTRAR COMO MENTOR';
      return;
    }
    await loadData();
    document.getElementById('home-title').textContent='Visão do Mentor';
    document.getElementById('btn-add-m').style.display='block';
    show('home');
  }catch(e){
    showE('mt-err',e.message.indexOf('Invalid')>=0||e.message.indexOf('credentials')>=0?'E-mail ou senha incorretos.':e.message);
    btn.disabled=false;btn.textContent='ENTRAR COMO MENTOR';
  }
}

function sair(){TK=null;UID=null;PROF=null;MENTEES=[];show('auth');}

async function loadData(){
  try{
    var isM=PROF&&PROF.role==='mentor';
    if(isM){
      var ms=await sbFetch('GET','/rest/v1/mentees?select=*&order=created_at');
      for(var i=0;i<ms.length;i++){
        ms[i].actions=await sbFetch('GET','/rest/v1/actions?mentee_id=eq.'+ms[i].id+'&select=*');
        ms[i].checkins=await sbFetch('GET','/rest/v1/checkins?mentee_id=eq.'+ms[i].id+'&select=*');
        ms[i].swot_items=await sbFetch('GET','/rest/v1/swot_items?mentee_id=eq.'+ms[i].id+'&select=*');
      }
      MENTEES=ms;
    }else{
      var ms2=await sbFetch('GET','/rest/v1/mentees?user_id=eq.'+UID+'&select=*');
      if(ms2.length){
        ms2[0].actions=await sbFetch('GET','/rest/v1/actions?mentee_id=eq.'+ms2[0].id+'&select=*');
        ms2[0].checkins=await sbFetch('GET','/rest/v1/checkins?mentee_id=eq.'+ms2[0].id+'&select=*');
        ms2[0].swot_items=await sbFetch('GET','/rest/v1/swot_items?mentee_id=eq.'+ms2[0].id+'&select=*');
        MENTEES=ms2;
      }else{MENTEES=[];}
    }
    renderHome();
  }catch(e){toast('Erro ao carregar: '+e.message);}
}

function renderHome(){
  var b=document.getElementById('home-body');
  var all=[];MENTEES.forEach(function(m){(m.actions||[]).forEach(function(a){all.push(a);});});
  var done=all.filter(function(a){return a.done;}).length;
  var lateN=all.filter(function(a){return isLate(a.due_date,a.done);}).length;
  var pend=all.filter(function(a){return !a.done&&!isLate(a.due_date,a.done);}).length;
  var pct=all.length?Math.round(done/all.length*100):0;
  var isM=PROF&&PROF.role==='mentor';

  var h='<div class="section">Visão Geral</div><div class="stat-card">';
  h+='<div class="stat-row"><div class="ring-wrap">'+ring(pct,74,8,'#B69040')+'<div class="ring-label"><div class="ring-pct">'+pct+'%</div><div class="ring-sub">geral</div></div></div>';
  h+='<div class="stat-items">';
  h+='<div class="stat-item"><div class="stat-dot" style="background:#3A7848"></div><div class="stat-lbl">Concluídas</div><div class="stat-val" style="color:#3A7848">'+done+'</div></div>';
  h+='<div class="stat-item"><div class="stat-dot" style="background:#B87018"></div><div class="stat-lbl">Pendentes</div><div class="stat-val" style="color:#B87018">'+pend+'</div></div>';
  h+='<div class="stat-item"><div class="stat-dot" style="background:#882020"></div><div class="stat-lbl">Atrasadas</div><div class="stat-val" style="color:#882020">'+lateN+'</div></div>';
  h+='</div></div>';
  h+='<div class="stat-grid">';
  h+='<div class="stat-box"><div class="stat-num">'+MENTEES.length+'</div><div class="stat-name">Mentorados</div></div>';
  h+='<div class="stat-box"><div class="stat-num">'+all.length+'</div><div class="stat-name">Ações</div></div>';
  h+='<div class="stat-box"><div class="stat-num">'+done+'</div><div class="stat-name">Concluídas</div></div>';
  h+='<div class="stat-box"><div class="stat-num" style="color:'+(lateN>0?'#882020':'#1A2838')+'">'+lateN+'</div><div class="stat-name">Atrasadas</div></div>';
  h+='</div></div>';

  h+='<div class="section">Mentorados</div><div class="mentee-card">';
  if(!MENTEES.length){
    h+='<div class="empty">'+(isM?'<button class="btn-primary" onclick="openSh(\'sh-mentee\')" style="max-width:260px;margin:0 auto;display:block">+ Cadastrar primeiro mentorado</button>':'Seu plano será configurado pelo mentor.')+'</div>';
  }else{
    MENTEES.forEach(function(m){
      var acts=m.actions||[],p2=wp(acts),l2=acts.filter(function(a){return isLate(a.due_date,a.done);}).length;
      var p=PC[m.path]||PC.trajetoria;
      h+='<div class="mentee-row" onclick="openDet(\''+m.id+'\')">';
      h+='<div class="avatar" style="background:'+p.c+'">'+avs(m.name)+'</div>';
      h+='<div style="flex:1;min-width:0"><div class="mentee-name">'+m.name+'</div>';
      h+='<div class="mentee-co">'+(m.company||'')+'</div>';
      h+='<div class="badges"><span class="badge" style="background:'+p.bg+';color:'+p.c+'">'+p.l+'</span>';
      if(l2>0)h+='<span class="badge badge-late">⚠ '+l2+'</span>';
      h+='<span class="badge-count">'+acts.filter(function(a){return a.done;}).length+'/'+acts.length+'</span></div></div>';
      h+='<div class="ring-sm">'+ring(p2,36,4,p.c)+'<div class="ring-sm-lbl" style="color:'+p.c+'">'+p2+'%</div></div>';
      h+='<div style="color:#C6B89E;font-size:20px;margin-left:4px">›</div></div>';
    });
  }
  h+='</div>';
  b.innerHTML=h;
}

function openDet(id){
  CUR=id;CTAB='plano';
  show('detail');
  renderDetail();
}

function backHome(){show('home');renderHome();}

function renderDetail(){
  var m=MENTEES.find(function(x){return x.id===CUR;});
  if(!m)return;
  var p=PC[m.path]||PC.trajetoria,pct=wp(m.actions||[]),isM=PROF&&PROF.role==='mentor';

  var hero='<button class="back-btn" onclick="backHome()">‹</button>';
  hero+='<div class="detail-info">';
  hero+='<div class="avatar" style="width:44px;height:44px;background:'+p.c+'">'+avs(m.name)+'</div>';
  hero+='<div style="flex:1;min-width:0"><div class="detail-name">'+m.name+'</div>';
  hero+='<div class="detail-sub">'+(m.company||'')+' · '+(m.cycle||'')+'</div></div>';
  hero+='<div class="ring-wrap">'+ring(pct,50,6,p.c,'rgba(255,255,255,.2)')+'<div class="ring-label"><div style="font-size:10px;font-weight:700;color:#B69040">'+pct+'%</div></div></div>';
  hero+='</div>';
  document.getElementById('d-hero').innerHTML=hero;

  var tabs=[['plano','Plano'],['swot','SWOT'],['sessoes','Sessões']];
  document.getElementById('d-tabs').innerHTML=tabs.map(function(t){
    return '<button class="tab '+(t[0]===CTAB?'on':'')+'" onclick="swTab(\''+t[0]+'\',this)">'+t[1]+'</button>';
  }).join('');

  renderTab(CTAB,m,isM);
}

function swTab(tab,btn){
  CTAB=tab;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderTab(tab,MENTEES.find(function(x){return x.id===CUR;}),PROF&&PROF.role==='mentor');
}

function renderTab(tab,m,isM){
  var b=document.getElementById('d-body');
  b.innerHTML='';b.scrollTop=0;
  if(tab==='plano')rPlano(m,b,isM);
  else if(tab==='swot')rSwot(m,b,isM);
  else if(tab==='sessoes')rSess(m,b,isM);
}

function rPlano(m,b,isM){
  var acts=m.actions||[];
  var done=acts.filter(function(a){return a.done;}).length;
  var lateN=acts.filter(function(a){return isLate(a.due_date,a.done);}).length;
  var pend=acts.filter(function(a){return !a.done&&!isLate(a.due_date,a.done);}).length;
  var p=PC[m.path]||PC.trajetoria;
  var pct=wp(acts);

  var h='<div class="section">Resumo</div><div class="stat-card"><div style="display:grid;grid-template-columns:repeat(3,1fr)">';
  h+='<div style="padding:10px;text-align:center;border-right:1px solid #E8E1D4"><div class="stat-num" style="color:#3A7848">'+done+'</div><div class="stat-name">Concluídas</div></div>';
  h+='<div style="padding:10px;text-align:center;border-right:1px solid #E8E1D4"><div class="stat-num" style="color:#B87018">'+pend+'</div><div class="stat-name">Pendentes</div></div>';
  h+='<div style="padding:10px;text-align:center"><div class="stat-num" style="color:'+(lateN>0?'#882020':'#887E6E')+'">'+lateN+'</div><div class="stat-name">Atrasadas</div></div>';
  h+='</div><div style="padding:0 13px 10px"><div style="background:#E8E1D4;border-radius:3px;height:5px;overflow:hidden"><div style="height:100%;border-radius:3px;background:'+p.c+';width:'+pct+'%;transition:width .5s"></div></div>';
  h+='<div style="font-size:10px;color:#887E6E;margin-top:4px">Progresso ponderado · '+pct+'%</div></div></div>';

  ['high','medium','low'].forEach(function(pr){
    var grp=acts.filter(function(a){return a.priority===pr;});
    if(!grp.length)return;
    h+='<div class="section" style="display:flex;align-items:center;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:'+PCOL[pr]+'"></div>'+PL[pr]+' Prioridade</div>';
    h+='<div class="act-card">';
    grp.forEach(function(a){
      var l2=isLate(a.due_date,a.done),d2=dl(a.due_date);
      h+='<div class="act-row"><div class="act-inner">';
      h+='<div class="check '+(a.done?'done':'')+'" onclick="toggleAct(\''+a.id+'\',\''+m.id+'\')">';
      if(a.done)h+='<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 7L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      h+='</div><div style="flex:1">';
      h+='<div class="act-title '+(a.done?'done':'')+'">'+a.title+'</div>';
      h+='<div class="act-meta">';
      if(a.kpi)h+='<span class="act-kpi">KPI: '+a.kpi+'</span>';
      h+='</div>';
      if(a.done&&a.done_at)h+='<div class="act-date" style="color:#3A7848">✓ '+fd(a.done_at)+'</div>';
      if(!a.done&&a.due_date){
        var col=l2?'#882020':d2!=null&&d2<=7?'#B87018':'#887E6E';
        var txt=l2?'⚠ Atrasado · era '+fd(a.due_date):d2===0?'⏰ Hoje':'Prazo: '+fd(a.due_date)+(d2!=null?' · '+d2+'d':'');
        h+='<div class="act-date" style="color:'+col+'">'+txt+'</div>';
      }
      if(a.baseline&&a.target)h+='<div style="font-size:10px;color:#887E6E;margin-top:3px"><span style="color:#9E5733">'+a.baseline+'</span> → <span style="color:#3A7848;font-weight:500">'+a.target+'</span></div>';
      h+='</div>';
      if(isM)h+='<button onclick="delAct(\''+a.id+'\',\''+m.id+'\')" style="background:none;border:none;color:#D8CDB8;font-size:18px;cursor:pointer;padding:2px 4px;flex-shrink:0">×</button>';
      h+='</div></div>';
    });
    h+='</div>';
  });

  if(!acts.length)h+='<div class="empty">Nenhuma ação ainda.</div>';
  if(isM)h+='<div style="margin:10px 14px 4px"><button class="btn-primary" onclick="openAddAct(\''+m.id+'\')">+ Nova Ação</button></div>';
  b.innerHTML=h;
}

function rSwot(m,b,isM){
  var items=m.swot_items||[];
  var quads=[{k:'f',t:'Forças',e:'Strengths',c:'#3A3A26',bg:'#EAECE2'},{k:'w',t:'Fraquezas',e:'Weaknesses',c:'#7A3C26',bg:'#F2EBE6'},{k:'o',t:'Oportunidades',e:'Opportunities',c:'#22364A',bg:'#E6EBF2'},{k:'t',t:'Ameaças',e:'Threats',c:'#9E5733',bg:'#F0E8CC'}];
  var h='<div class="section">Análise SWOT</div><div class="swot-grid">';
  quads.forEach(function(q){
    var qi=items.filter(function(i){return i.quadrant===q.k;});
    h+='<div class="swot-q"><div class="swot-head" style="background:'+q.c+'"><div class="swot-name" style="color:white">'+q.t+'</div><div style="font-size:8px;color:rgba(255,255,255,.7);margin-top:1px">'+q.e+'</div></div>';
    h+='<div class="swot-body" style="background:'+q.bg+'">';
    qi.forEach(function(i){h+='<div class="swot-item"><div class="swot-dot" style="background:'+q.c+'"></div><span>'+i.content+'</span></div>';});
    if(!qi.length)h+='<div style="font-size:10px;color:#C6B89E;font-style:italic">Nenhum item.</div>';
    h+='</div></div>';
  });
  h+='</div>';
  b.innerHTML=h;
}

function rSess(m,b,isM){
  var ci=[].concat(m.checkins||[]).sort(function(a,x){return(x.session_date||x.created_at||'').localeCompare(a.session_date||a.created_at||'');});
  var h='';
  if(isM)h+='<div style="margin:12px 14px 4px"><button class="btn-primary" onclick="openCIFor(\''+m.id+'\')">+ Registrar Sessão</button></div>';
  h+='<div class="section">Histórico</div><div class="sess-card">';
  if(!ci.length)h+='<div class="empty">Nenhuma sessão registrada.</div>';
  else ci.forEach(function(c){
    h+='<div class="sess-row"><div class="sess-head"><span class="sess-date">'+fd(c.session_date||c.created_at)+'</span><span class="sess-mentor">com '+c.mentor+'</span><span style="font-size:14px">'+(c.mood?c.mood.split(' ')[0]:'⚪')+'</span></div>';
    h+='<div class="sess-note">'+c.note+'</div></div>';
  });
  h+='</div>';
  b.innerHTML=h;
}

async function saveMentee(){
  var name=(document.getElementById('fm-n').value||'').trim();
  if(!name){toast('Informe o nome');return;}
  try{
    await sbFetch('POST','/rest/v1/mentees',{name:name,company:(document.getElementById('fm-c').value||'').trim(),path:document.getElementById('fm-p').value,cycle:(document.getElementById('fm-cy').value||'').trim()});
    closeSh();document.getElementById('fm-n').value='';document.getElementById('fm-c').value='';document.getElementById('fm-cy').value='';
    toast('✓ Mentorado cadastrado');await loadData();
  }catch(e){toast('Erro: '+e.message);}
}

function openAddAct(mid){CUR=mid;openSh('sh-action');}

async function saveAction(){
  var title=(document.getElementById('fa-t').value||'').trim();
  if(!title||!CUR){toast('Informe o comprometimento');return;}
  try{
    await sbFetch('POST','/rest/v1/actions',{mentee_id:CUR,title:title,why:(document.getElementById('fa-w').value||'').trim(),kpi:(document.getElementById('fa-k').value||'').trim(),baseline:(document.getElementById('fa-b').value||'').trim(),target:(document.getElementById('fa-g').value||'').trim(),priority:document.getElementById('fa-pr').value,due_date:document.getElementById('fa-d').value||null});
    closeSh();['fa-t','fa-w','fa-k','fa-b','fa-g','fa-d'].forEach(function(id){document.getElementById(id).value='';});
    toast('✓ Ação adicionada');await loadData();
    renderTab(CTAB,MENTEES.find(function(m){return m.id===CUR;}),PROF&&PROF.role==='mentor');
  }catch(e){toast('Erro: '+e.message);}
}

async function toggleAct(aid,mid){
  var m=MENTEES.find(function(x){return x.id===mid;});
  var a=m&&m.actions&&m.actions.find(function(x){return x.id===aid;});
  if(!a)return;
  try{
    await sbFetch('PATCH','/rest/v1/actions?id=eq.'+aid,{done:!a.done,done_at:!a.done?new Date().toISOString():null});
    toast(a.done?'Marcada como pendente':'✓ Meta concluída!');
    await loadData();
    renderTab(CTAB,MENTEES.find(function(m){return m.id===mid;}),PROF&&PROF.role==='mentor');
  }catch(e){toast('Erro');}
}

async function delAct(aid,mid){
  if(!confirm('Remover esta ação?'))return;
  try{
    await sbFetch('DELETE','/rest/v1/actions?id=eq.'+aid,null);
    toast('Removido');await loadData();
    renderTab(CTAB,MENTEES.find(function(m){return m.id===mid;}),PROF&&PROF.role==='mentor');
  }catch(e){toast('Erro: '+e.message);}
}

function openCIFor(mid){CURCI=mid;openSh('sh-ci');}

async function saveCI(){
  var note=(document.getElementById('ci-n').value||'').trim();
  if(!note||!CURCI){toast('Escreva uma observação');return;}
  try{
    await sbFetch('POST','/rest/v1/checkins',{mentee_id:CURCI,session_date:document.getElementById('ci-d').value||td(),mentor:document.getElementById('ci-m').value,mood:document.getElementById('ci-mo').value,note:note});
    closeSh();document.getElementById('ci-n').value='';
    toast('✓ Sessão registrada');await loadData();
    renderTab('sessoes',MENTEES.find(function(m){return m.id===CURCI;}),PROF&&PROF.role==='mentor');
  }catch(e){toast('Erro: '+e.message);}
}
</script>
